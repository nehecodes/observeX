receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  resource:
    attributes:
      - action: insert
        key: loki.resource.labels
        value: service.name, deployment.environment

exporters:
  otlp/tempo:
    # Forward to Tempo's internal OTLP gRPC port (4319).
    # Tempo listens on 4319 internally; this collector owns the public 4317 port.
    endpoint: localhost:4319
    tls:
      insecure: true

  loki:
    endpoint: http://localhost:3100/loki/api/v1/push

  logging:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]

    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [loki]
