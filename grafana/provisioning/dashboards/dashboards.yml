apiVersion: 1

providers:
  - name: observeX
    orgId: 1
    type: file
    disableDeletion: false      # Allow Terraform to update dashboard files
    updateIntervalSeconds: 30   # Grafana checks for file changes every 30s
    allowUiUpdates: false       # Prevent saving changes via UI — all changes go through IaC
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
